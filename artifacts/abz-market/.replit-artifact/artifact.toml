kind = "web"
previewPath = "/"
title = "ABZ Market - Telegram Mini App"
version = "1.0.0"
id = "artifacts/abz-market"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21370

[services.development]
run = "pnpm --filter @workspace/abz-market run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/abz-market", "run", "build" ]
publicDir = "artifacts/abz-market/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21370"
BASE_PATH = "/"
